plugins {
    id 'java-library'
    id 'maven-publish'
}

group = rootProject.group
version = rootProject.version

base {
    archivesName = 'blue-contract-java-quickjs-chicory'
}

repositories {
    if (!System.getenv('CI')) {
        mavenLocal()
    }
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
    withSourcesJar()
    withJavadocJar()
}

def generatedResourcesDir = layout.buildDirectory.dir('generated-resources')
def chicoryResourceDir = generatedResourcesDir.map {
    it.dir('blue/contract/processor/quickjs/chicory')
}
def expectedGasVersion = 8
def expectedExecutionProfile = 'baseline-v1'
def expectedAbiManifestHash = 'e23b0b2ee169900bbde7aff78e6ce20fead1715c60f8a8e3106d9959450a3d34'

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    if (JavaVersion.current().isJava11Compatible()) {
        options.release = 11
    }
}

dependencies {
    api project(':')

    implementation 'com.dylibso.chicory:runtime:1.7.5'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(GenerateModuleMetadata).configureEach {
    enabled = false
}

tasks.register('copyBlueQuickJsWasmResources') {
    def configuredRoot = providers.gradleProperty('blueQuickJsRoot')
            .orElse(providers.systemProperty('blue.quickjs.root'))
    inputs.property('blueQuickJsRoot', configuredRoot.orNull ?: '')
    outputs.dir(chicoryResourceDir)
    doLast {
        if (!configuredRoot.present || configuredRoot.get().trim().isEmpty()) {
            throw new GradleException('copyBlueQuickJsWasmResources requires -PblueQuickJsRoot or -Dblue.quickjs.root')
        }
        def root = file(configuredRoot.get())
        def sourceDir = new File(root, 'libs/quickjs-wasm/dist/wasm')
        def buildDir = new File(root, 'libs/quickjs-wasm-build/dist')
        def wasm = new File(sourceDir, 'quickjs-eval.wasm')
        if (!wasm.isFile()) {
            wasm = new File(buildDir, 'quickjs-eval.wasm')
        }
        if (!wasm.isFile()) {
            throw new GradleException("Missing canonical quickjs-eval.wasm under ${root}")
        }
        if (wasm.name.contains('debug') || wasm.name.contains('wasm64')) {
            throw new GradleException("Rejected non-release/non-wasm32 artifact: ${wasm}")
        }
        byte[] wasmBytes = wasm.bytes
        if (wasmBytes.length < 4 || wasmBytes[0] != 0 || wasmBytes[1] != 0x61 || wasmBytes[2] != 0x73 || wasmBytes[3] != 0x6d) {
            throw new GradleException("Invalid wasm magic bytes: ${wasm}")
        }
        def metadata = new File(wasm.parentFile, 'quickjs-wasm-build.metadata.json')
        if (!metadata.isFile()) {
            metadata = new File(buildDir, 'quickjs-wasm-build.metadata.json')
        }
        if (!metadata.isFile()) {
            throw new GradleException("Missing quickjs wasm metadata for ${wasm}")
        }
        def parsed = new groovy.json.JsonSlurper().parse(metadata)
        def release = parsed.variants?.wasm32?.release
        if (release == null) {
            throw new GradleException('Metadata missing wasm32/release artifact')
        }
        if (release.buildType != 'release' || release.wasm?.filename != 'quickjs-eval.wasm') {
            throw new GradleException('Metadata does not describe canonical wasm32 release artifact')
        }
        def digest = java.security.MessageDigest.getInstance('SHA-256').digest(wasmBytes).collect { String.format('%02x', it & 0xff) }.join()
        if (digest != release.engineBuildHash || digest != release.wasm?.sha256 || digest != parsed.engineBuildHash) {
            throw new GradleException("Wasm hash mismatch for ${wasm}")
        }
        def parsedMap = parsed as Map
        if (parsedMap.containsKey('gasVersion') && !(parsed.gasVersion instanceof Number)) {
            throw new GradleException('Metadata gasVersion must be numeric')
        }
        if (parsedMap.containsKey('executionProfile') && !(parsed.executionProfile instanceof CharSequence)) {
            throw new GradleException('Metadata executionProfile must be a string')
        }
        if (parsedMap.containsKey('abiManifestHash') && !(parsed.abiManifestHash instanceof CharSequence)) {
            throw new GradleException('Metadata abiManifestHash must be a string')
        }
        def gasVersion = parsed.gasVersion instanceof Number ? parsed.gasVersion as int : expectedGasVersion
        if (gasVersion != expectedGasVersion) {
            throw new GradleException("Unsupported gasVersion: expected ${expectedGasVersion}, actual ${gasVersion}")
        }
        def executionProfile = parsed.executionProfile ?: expectedExecutionProfile
        if (executionProfile != expectedExecutionProfile) {
            throw new GradleException("Unsupported executionProfile: expected ${expectedExecutionProfile}, actual ${executionProfile}")
        }
        def abiManifestHash = parsed.abiManifestHash ?: expectedAbiManifestHash
        if (abiManifestHash != expectedAbiManifestHash) {
            throw new GradleException("Unsupported abiManifestHash: expected ${expectedAbiManifestHash}, actual ${abiManifestHash}")
        }
        def outDir = chicoryResourceDir.get().asFile
        outDir.mkdirs()
        new File(outDir, 'quickjs-eval.wasm').bytes = wasmBytes
        def enriched = new LinkedHashMap(parsedMap)
        // Temporary bridge until upstream quickjs-wasm metadata publishes the
        // gas version, execution profile, and ABI manifest hash consistently.
        enriched.gasVersion = gasVersion
        enriched.executionProfile = executionProfile
        enriched.abiManifestHash = abiManifestHash
        new File(outDir, 'engine-metadata.json').text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(enriched)) + '\n'
        new File(outDir, 'host-v1-hash.txt').text = expectedAbiManifestHash + '\n'
        def manifestHex = ''
        new File(outDir, 'host-v1-manifest.dv').bytes = manifestHex.decodeHex()
    }
}

sourceSets.main.resources.srcDir generatedResourcesDir

tasks.named('processResources') {
    if (project.hasProperty('blueQuickJsRoot') || System.getProperty('blue.quickjs.root')) {
        dependsOn tasks.named('copyBlueQuickJsWasmResources')
    }
}

tasks.named('sourcesJar') {
    if (project.hasProperty('blueQuickJsRoot') || System.getProperty('blue.quickjs.root')) {
        dependsOn tasks.named('copyBlueQuickJsWasmResources')
    }
}

test {
    useJUnitPlatform {
        excludeTags 'benchmark', 'stress'
    }
    if (System.getProperty('blue.quickjs.root')) {
        systemProperty 'blue.quickjs.root', System.getProperty('blue.quickjs.root')
    }
    if (project.hasProperty('blueQuickJsRoot')) {
        systemProperty 'blue.quickjs.root', project.property('blueQuickJsRoot')
    }
    testLogging {
        events 'PASSED', 'FAILED', 'SKIPPED'
        showStandardStreams = true
    }
}

tasks.register('benchmarkTest', Test) {
    description = 'Runs Chicory benchmark report tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    shouldRunAfter test
    useJUnitPlatform {
        includeTags 'benchmark'
    }
    if (System.getProperty('blue.quickjs.root')) {
        systemProperty 'blue.quickjs.root', System.getProperty('blue.quickjs.root')
    }
    if (project.hasProperty('blueQuickJsRoot')) {
        systemProperty 'blue.quickjs.root', project.property('blueQuickJsRoot')
    }
    testLogging {
        events 'PASSED', 'FAILED', 'SKIPPED'
        showStandardStreams = true
    }
}

tasks.register('stressTest', Test) {
    description = 'Runs Chicory stress tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    shouldRunAfter test
    useJUnitPlatform {
        includeTags 'stress'
    }
    if (System.getProperty('blue.quickjs.root')) {
        systemProperty 'blue.quickjs.root', System.getProperty('blue.quickjs.root')
    }
    if (project.hasProperty('blueQuickJsRoot')) {
        systemProperty 'blue.quickjs.root', project.property('blueQuickJsRoot')
    }
    testLogging {
        events 'PASSED', 'FAILED', 'SKIPPED'
        showStandardStreams = true
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'blue.contract'
            artifactId = 'blue-contract-java-quickjs-chicory'
            from components.java

            pom {
                name = 'Blue Contract Java QuickJS Chicory Runtime'
                description = 'Experimental optional JVM-only Chicory runtime for blue-quickjs.'
                url = 'https://language.blue'
                licenses {
                    license {
                        name = 'MIT license'
                        url = 'https://github.com/bluecontract/blue-contract-java/blob/main/LICENSE'
                    }
                }
                developers {
                    developer {
                        name = 'Blue'
                        email = 'devsupport@timeline.blue'
                    }
                }
                scm {
                    url = 'https://github.com/bluecontract/blue-contract-java.git'
                    connection = 'scm:git:git@github.com:bluecontract/blue-contract-java.git'
                    developerConnection = 'scm:git:git@github.com:bluecontract/blue-contract-java.git'
                }
            }
        }
    }

    repositories {
        maven {
            url = rootProject.layout.buildDirectory.dir('staging-deploy')
        }
        if (!System.getenv('CI')) {
            maven {
                name = 'local'
                url = uri('file:///' + new File(System.getProperty('user.home'), '.m2/repository').absolutePath)
            }
        }
    }
}
