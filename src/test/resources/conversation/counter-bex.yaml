name: Counter
counter: 0
contracts:
  ownerChannel:
    type:
      blueId: EUC3rbFxhUkEwQFTLD3FUrsgQuQfnN8LUA7a74nTNRHm
    timelineId: counter-timeline
  increment:
    description: Increment the counter by the given number
    type: Conversation/Operation
    channel: ownerChannel
    request:
      description: Represents a value by which counter will be incremented
      type: Integer
  incrementImpl:
    type: Conversation/Sequential Workflow Operation
    operation: increment
    steps:
      - name: ApplyIncrement
        type: Conversation/Update Document
        changeset:
          - op: replace
            path: /counter
            val:
              $add:
                - $document: /counter
                - $binding:
                    name: event
                    path: /message/request
      - name: CreateMessageEvent
        type: Conversation/Compute
        do:
          - $appendEvent:
              $merge:
                - type: Conversation/Chat Message
                - message:
                    $concat:
                      - Counter was incremented by
                      - " "
                      - $binding:
                          name: event
                          path: /message/request
                      - " and is now "
                      - $text:
                          $document: /counter
          - $return: {}
